# .github/workflows/test.yml — 单元测试 + 集成测试
# 触发: push / pull_request 到 main
# 矩阵: Windows + Node 20 / 22
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  integration-test:
    name: Integration (Windows + Chrome)
    runs-on: windows-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Verify Chrome available
        shell: pwsh
        run: |
          # 找 Chrome 路径
          $paths = @(
            "C:\Program Files\Google\Chrome\Application\chrome.exe",
            "C:\Program Files (x86)\Google\Chrome\Application\chrome.exe",
            "$env:LOCALAPPDATA\Google\Chrome\Application\chrome.exe"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Chrome found: $p"
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Host "::warning::Chrome not pre-installed — integration tests will skip"
          }
      - name: Start Chrome with CDP
        shell: pwsh
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          if (Test-Path $chrome) {
            Start-Process $chrome -ArgumentList "--remote-debugging-port=9222","--headless=new","--no-sandbox","--disable-gpu"
            Write-Host "Chrome started"
          } else {
            Write-Host "::warning::Chrome not found, integration tests will skip"
          }
      - name: Wait for CDP
        shell: pwsh
        run: |
          for ($i=0; $i -lt 30; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:9222/json/version" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                Write-Host "CDP ready"
                exit 0
              }
            } catch {}
            Start-Sleep -Seconds 1
          }
          Write-Host "::warning::CDP not ready after 30s, integration tests will skip"
      - name: Run integration tests
        run: npm run test:integration
      - name: Stop Chrome
        if: always()
        shell: pwsh
        run: |
          Get-Process chrome -ErrorAction SilentlyContinue | Stop-Process -Force

  lint:
    name: Lint (syntax check)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Syntax check lib/ + tools/
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path lib,tools -Recurse -Filter *.js
          $errors = 0
          foreach ($f in $files) {
            $r = node --check $f.FullName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "✗ $($f.FullName)"
              Write-Host $r
              $errors++
            }
          }
          if ($errors -gt 0) {
            Write-Host "::error::$errors files failed syntax check"
            exit 1
          }
          Write-Host "✓ All $files.Count files passed syntax check"